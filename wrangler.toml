name = "cooldown-planner"
compatibility_date = "2025-12-01"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = "web/dist"
# Local dev does NOT use wrangler's `-- <cmd>` proxy mode : it's deprecated
# AND refuses to coexist with pages_build_output_dir since wrangler ~4.9x
# ("Specify either a directory OR a proxy command, not both"). Instead the
# dev flow runs three processes (see package.json) :
#   - wrangler pages dev web/public :8788 -> Functions + bindings only (the
#     static dir is a placeholder ; nobody browses 8788 directly)
#   - vite :5173 -> the app, with /api proxied to 8788 (web/vite.config.ts)
#   - do-worker :8787 -> PlanDO
# Open http://localhost:5173 in dev.

# ---------------------------------------------------------------------------
# Bindings exposed to Pages Functions (functions/**)
# ---------------------------------------------------------------------------

# Référentiel jobs/abilities — clef unique "jobs:all" (~30KB JSON).
# Créer le namespace avant le premier deploy :
#   wrangler kv namespace create JOBS_KV
#   wrangler kv namespace create JOBS_KV --preview
# Puis reporter les IDs ci-dessous.
[[kv_namespaces]]
binding = "JOBS_KV"
id = "358c1d95d6ac498cbb571620d529ae23"
preview_id = "b4c9e96769d5430f82c824ca437d6521"

# Durable Object hébergé dans le Worker `cooldown-planner-do` (cf do-worker/).
# Le Worker DOIT être déployé avant Pages, sinon le binding cross-script ne
# résout pas en prod. En local : `npm run dev` lance les deux en parallèle.
[[durable_objects.bindings]]
name = "PLAN_DO"
class_name = "PlanDO"
script_name = "cooldown-planner-do"

[vars]
ENVIRONMENT = "development"
